<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Reader PC</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- JSZip (Required for epub.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <!-- ePub.js -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        /* Variables de colores premium */
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --surface-bg: #ffffff;
            --border-color: #e2e8f0;
            --topbar-bg: #0284c7;
            /* Azul tiburón base */
            --highlight: #0ea5e9;
            --progress-bg: #3b82f6;
        }

        .theme-dark {
            --bg-color: #0f172a;
            /* Fondo oscuro muy profesional */
            --text-color: #f1f5f9;
            --surface-bg: #1e293b;
            --border-color: #334155;
            --topbar-bg: #0b1120;
            --highlight: #38bdf8;
            --progress-bg: #3b82f6;
        }

        .theme-sepia {
            --bg-color: #fef3c7;
            --text-color: #451a03;
            --surface-bg: #fde68a;
            --border-color: #f5d0fe;
            --topbar-bg: #b45309;
            --highlight: #d97706;
            --progress-bg: #d97706;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* --- REDISEÑO DE LA BIBLIOTECA --- */
        .library-container {
            height: 100%;
            overflow-y: auto;
            padding: 2rem 3rem 6rem 3rem;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 2.5rem 1.5rem;
            align-items: start;
        }

        .book-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .book-container:hover {
            transform: translateY(-8px);
        }

        .book-cover {
            width: 100%;
            aspect-ratio: 2 / 3;
            background-color: #2d3748;
            background-size: cover;
            background-position: center;
            border-radius: 4px 8px 8px 4px;
            box-shadow: -4px 0px 8px rgba(0, 0, 0, 0.3), inset 2px 0 6px rgba(255, 255, 255, 0.2), 0 8px 15px rgba(0, 0, 0, 0.15);
            border-left: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-weight: bold;
            padding: 10px;
            transition: box-shadow 0.3s ease;
        }

        .book-container:hover .book-cover {
            box-shadow: -6px 0px 12px rgba(0, 0, 0, 0.4), inset 2px 0 6px rgba(255, 255, 255, 0.3), 0 12px 25px rgba(0, 0, 0, 0.25);
        }

        .book-cover.has-image {
            text-indent: -9999px;
        }

        .book-info-under {
            width: 100%;
            margin-top: 12px;
            text-align: left;
            padding: 0 4px;
        }

        .book-info-under .title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            /* Solución advertencia CSS */
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .book-info-under .author {
            font-size: 12px;
            opacity: 0.6;
            color: var(--text-color);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cover-progress-wrapper {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            height: 22px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            text-indent: 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .cover-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--progress-bg), #60a5fa);
            opacity: 0.9;
            transition: width 0.5s ease-out;
        }

        .cover-progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
            letter-spacing: 0.5px;
        }

        .favorite-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            z-index: 25;
            transition: transform 0.2s;
        }

        /* Animaciones Globales */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-in-left {
            animation: slideInLeft 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(0);
            }
        }

        /* Overlay Brillo */
        #brightness-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: black;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }

        /* Estilos Select Ordenar */
        .sort-select {
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 36px 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
        }

        .sort-select:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .sort-select option {
            background-color: var(--surface-bg);
            color: var(--text-color);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 6px;
            border: 3px solid var(--bg-color);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--highlight);
        }

        /* Controles laterales invisibles del lector */
        .reader-nav-zone {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        .reader-nav-zone:hover {
            opacity: 1;
        }

        .reader-nav-btn {
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border-radius: 50%;
            padding: 16px;
            backdrop-filter: blur(8px);
            transform: scale(0.9);
            transition: transform 0.2s;
        }

        .reader-nav-zone:hover .reader-nav-btn {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        /* Spinner Loader */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--highlight);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

            es: {
                appName: 'Shark Reader',

                fullscreen: 'Pantalla Completa',
                sortBy: 'Ordenar por',

        // --- COMPONENTE PRINCIPAL APP ---
        const App = () => {
            const [books, setBooks] = useState([]);
            const [view, setView] = useState('library');
            const [currentBookId, setCurrentBookId] = useState(null);
            const [lastReadId, setLastReadId] = useState(null);
            const [targetCfi, setTargetCfi] = useState(null);

            // Estado para detectar si estamos en Fullscreen nativo
            const [isFullscreen, setIsFullscreen] = useState(false);

            // Filtros y Ordenamiento
            const [currentFilter, setCurrentFilter] = useState('all');
            const [sortBy, setSortBy] = useState('lastRead');

            // UI States
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [settingsOpen, setSettingsOpen] = useState(false);
            const [contextMenu, setContextMenu] = useState(null);
            const [bookInfoModal, setBookInfoModal] = useState(null);

            // Preferencias Globales
            const [theme, setTheme] = useState('dark');
            const [lang, setLang] = useState('es');
            const [brightness, setBrightness] = useState(100);
            const [readFlow, setReadFlow] = useState('paginated');
            const [readLayout, setReadLayout] = useState('none');

            const t = translations[lang];
            const fileInputRef = useRef(null);
            const folderInputRef = useRef(null);

            useEffect(() => { document.body.className = `theme-${theme}`; }, [theme]);

            useEffect(() => {
                const closeContext = () => setContextMenu(null);
                const handleFsChange = () => setIsFullscreen(!!document.fullscreenElement);

                window.addEventListener('click', closeContext);
                document.addEventListener('fullscreenchange', handleFsChange);

                return () => {
                    window.removeEventListener('click', closeContext);
                    document.removeEventListener('fullscreenchange', handleFsChange);
                };
            }, []);

            const handleFilesUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const validFiles = files.filter(f => f.name.toLowerCase().endsWith('.pdf') || f.name.toLowerCase().endsWith('.epub'));
                if (validFiles.length === 0) {
                    alert("Por favor selecciona archivos .epub o .pdf.");
                    return;
                }

                const newBooksArray = [];
                for (let file of validFiles) {
                    const isPDF = file.name.toLowerCase().endsWith('.pdf');
                    let coverUrl = null;
                    let metadata = { title: file.name.replace(/\.[^/.]+$/, ""), creator: t.unknownAuthor };

                    if (!isPDF) {
                        try {
                            const tempBook = ePub();
                            await tempBook.open(file);
                            coverUrl = await tempBook.coverUrl();
                            const meta = await tempBook.loaded.metadata;
                            if (meta.title) metadata.title = meta.title;
                            if (meta.creator) metadata.creator = meta.creator;
                            tempBook.destroy();
                        } catch (err) {
                            console.error("Error extrayendo portada para", file.name);
                        }
                    }

                    newBooksArray.push({
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                        name: metadata.title,
                        author: metadata.creator,
                        file: file,
                        type: isPDF ? 'pdf' : 'epub',
                        url: URL.createObjectURL(file),
                        coverUrl: coverUrl,
                        color: `hsl(${200 + Math.random() * 40}, 70%, 40%)`,
                        isFav: false,
                        progress: 0,
                        lastLocation: null,
                        dateAdded: Date.now(),
                        lastReadDate: 0,
                        bookmarks: []
                    });
                }

                setBooks(prev => [...prev, ...newBooksArray]);
                if (fileInputRef.current) fileInputRef.current.value = '';
                if (folderInputRef.current) folderInputRef.current.value = '';
            };

            const openBook = (bookId, cfi = null) => {
                setCurrentBookId(bookId);
                setLastReadId(bookId);
                setTargetCfi(cfi);
                setBooks(prev => prev.map(b => b.id === bookId ? { ...b, lastReadDate: Date.now() } : b));
                setView('reader');
            };

            const closeBook = () => {
                setView('library');
                if (document.fullscreenElement && document.exitFullscreen) {
                    document.exitFullscreen();
                }
                setTimeout(() => {
                    setCurrentBookId(null);
                    setTargetCfi(null);
                }, 300);
            };

            const handleContextMenu = (e, book) => {
                e.preventDefault();
                setContextMenu({ x: e.pageX, y: e.pageY, book });
            };

            const toggleFavorite = (bookId) => {
                setBooks(books.map(b => b.id === bookId ? { ...b, isFav: !b.isFav } : b));
            };

            const deleteBook = (bookId) => {
                setBooks(books.filter(b => b.id !== bookId));
                if (lastReadId === bookId) setLastReadId(null);
            };

            // Callback optimizado para actualizar locación/porcentaje con validaciones robustas
            const updateBookLocation = useCallback((bookId, cfi, percent) => {
                setBooks(prev => {
                    const book = prev.find(b => b.id === bookId);
                    if (!book) return prev;
                    if (book.lastLocation === cfi && book.progress === percent) return prev;

                    return prev.map(b => b.id === bookId ? { ...b, lastLocation: cfi, progress: percent, lastReadDate: Date.now() } : b);
                });
            }, []);

            const toggleBookmarkInApp = useCallback((bookId, cfi, note = "Marcador") => {
                setBooks(prev => prev.map(b => {
                    if (b.id !== bookId) return b;
                    const exists = b.bookmarks.find(bm => bm.cfi === cfi);
                    if (exists) {
                        return { ...b, bookmarks: b.bookmarks.filter(bm => bm.cfi !== cfi) };
                    } else {
                        return { ...b, bookmarks: [...b.bookmarks, { cfi, note, date: new Date().toLocaleDateString() }] };
                    }
                }));
            }, []);

            // FILTRADO Y ORDENAMIENTO
            let displayedBooks = books.filter(b => currentFilter === 'favorites' ? b.isFav : true);
            displayedBooks.sort((a, b) => {
                if (sortBy === 'lastRead') return (b.lastReadDate || 0) - (a.lastReadDate || 0);
                if (sortBy === 'added') return (b.dateAdded || 0) - (a.dateAdded || 0);
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                if (sortBy === 'progress') return (b.progress || 0) - (a.progress || 0);
                return 0;
            });

            const currentBookData = books.find(b => b.id === currentBookId);
            const allBookmarks = books.filter(b => b.bookmarks.length > 0);

            return (
                <div className="w-full h-screen flex flex-col relative" style={{ backgroundColor: 'var(--bg-color)', color: 'var(--text-color)' }}>

                    {/* Overlay Brillo */}
                    <div id="brightness-overlay" style={{ opacity: 1 - (brightness / 100) }}></div>

                    {/* TOP BAR PRINCIPAL - VISIBLE SOLO EN LA BIBLIOTECA O CONFIGURACIÓN */}
                    {view === 'library' && (
                        <div className="flex-shrink-0 flex items-center justify-between px-6 text-white shadow-lg z-20 h-16 transition-all duration-300" style={{ backgroundColor: 'var(--topbar-bg)' }}>
                            <div className="flex items-center gap-5">
                                <button onClick={() => setSidebarOpen(true)} className="p-2 hover:bg-black/20 rounded-full transition transform hover:scale-105"><Icons.Menu /></button>
                                <div className="flex flex-col">
                                    <span className="font-bold text-xl tracking-wider shadow-sm truncate max-w-xs sm:max-w-md">
                                        {t.appName}
                                    </span>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <div className="hidden md:flex gap-3 mr-2 fade-in items-center">
                                    {books.length > 0 && (
                                        <select className="sort-select" value={sortBy} onChange={(e) => setSortBy(e.target.value)} title={t.sortBy}>
                                            <option value="lastRead">{t.sortLastRead}</option>
                                            <option value="added">{t.sortAdded}</option>
                                            <option value="name">{t.sortName}</option>
                                            <option value="progress">{t.sortProgress}</option>
                                        </select>
                                    )}

                                    <div className="w-px h-6 bg-white/20 mx-1"></div>

                                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-all shadow-sm font-semibold text-sm">
                                        <Icons.Plus /> {t.addBook}
                                    </button>
                                    <button onClick={() => folderInputRef.current.click()} className="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl transition-all shadow-sm font-semibold text-sm">
                                        <Icons.FolderPlus /> {t.addFolder}
                                    </button>
                                </div>

                                {lastReadId && (
                                    <button onClick={() => openBook(lastReadId)} className="flex items-center gap-2 px-4 py-2 rounded-xl transition-all text-sm font-bold bg-green-500 hover:bg-green-400 text-white shadow-md hover:shadow-lg mr-2">
                                        <Icons.Play /> <span className="hidden lg:inline">{t.continueReading}</span>
                                    </button>
                                )}

                                <button onClick={() => setSettingsOpen(true)} className="p-2 hover:bg-black/20 rounded-full transition transform hover:rotate-90" title={t.settings}>
                                    <Icons.Settings />
                                </button>
                            </div>
                        </div>
                    )}

                    <input type="file" accept=".epub,.pdf" multiple ref={fileInputRef} className="hidden" onChange={handleFilesUpload} />
                    <input type="file" multiple ref={folderInputRef} className="hidden" onChange={handleFilesUpload} webkitdirectory="true" />

                    {/* SIDEBAR LATERAL */}
                    {sidebarOpen && (
                        <div className="fixed inset-0 z-50 flex">
                            <div className="w-80 h-full shadow-2xl flex flex-col slide-in-left border-r" style={{ backgroundColor: 'var(--surface-bg)', borderColor: 'var(--border-color)' }}>
                                <div className="p-6 pb-4 border-b flex justify-between items-center" style={{ borderColor: 'var(--border-color)' }}>
                                    <h2 className="text-2xl font-black tracking-tight" style={{ color: 'var(--topbar-bg)' }}>Shark Reader</h2>
                                    <button onClick={() => setSidebarOpen(false)} className="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition"><Icons.Close /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto py-4 px-3">

                                    {lastReadId && (
                                        <div className="px-3 mb-5 fade-in">
                                            <button onClick={() => { openBook(lastReadId); setSidebarOpen(false); }} className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl font-bold text-white shadow-md hover:shadow-lg transition transform hover:-translate-y-0.5" style={{ backgroundColor: 'var(--topbar-bg)' }}>
                                                <Icons.Play /> {t.continueReading}
                                            </button>
                                        </div>
                                    )}

                                    <div className="space-y-1">
                                        <button onClick={() => { setCurrentFilter('all'); setView('library'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition text-left font-semibold ${currentFilter === 'all' ? 'bg-blue-500/10 text-blue-600 dark:text-blue-400' : 'hover:bg-black/5 dark:hover:bg-white/5'}`}>
                                            <span className="opacity-80"><Icons.Library /></span> {t.library} <span className="ml-auto text-xs font-bold px-2 py-1 bg-black/5 dark:bg-white/10 rounded-lg">{books.length}</span>
                                        </button>
                                        <button onClick={() => { setCurrentFilter('favorites'); setView('library'); setSidebarOpen(false); }} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition text-left font-semibold ${currentFilter === 'favorites' ? 'bg-red-500/10 text-red-500' : 'hover:bg-black/5 dark:hover:bg-white/5'}`}>
                                            <span className="opacity-80"><Icons.Heart className="text-red-500" /></span> {t.favorites} <span className="ml-auto text-xs font-bold px-2 py-1 bg-black/5 dark:bg-white/10 rounded-lg">{books.filter(b => b.isFav).length}</span>
                                        </button>
                                    </div>

                                    <div className="my-5 border-t mx-3" style={{ borderColor: 'var(--border-color)' }}></div>

                                    <div className="px-3">
                                        <div className="flex items-center gap-2 font-black opacity-50 mb-3 uppercase text-xs tracking-widest pl-1">
                                            <Icons.Bookmark /> {t.bookmarks}
                                        </div>
                                        {allBookmarks.length === 0 ? (
                                            <p className="text-sm opacity-50 italic px-2">{t.noBookmarks}</p>
                                        ) : (
                                            allBookmarks.map(b => (
                                                <div key={'bm-' + b.id} className="mb-4 bg-black/5 dark:bg-white/5 p-4 rounded-2xl border border-black/5 dark:border-white/5 fade-in">
                                                    <p className="text-sm font-bold mb-3" style={{ color: 'var(--highlight)' }}>{b.name}</p>
                                                    <div className="flex flex-col gap-2">
                                                        {b.bookmarks.map((bm, i) => (
                                                            <button
                                                                key={i}
                                                                onClick={() => { openBook(b.id, bm.cfi); setSidebarOpen(false); }}
                                                                className="text-xs w-full text-left p-1 hover:opacity-70 transition flex items-center gap-3"
                                                            >
                                                                <div className="w-2 h-2 rounded-full bg-yellow-500 flex-shrink-0"></div>
                                                                <span className="flex-1 font-semibold truncate text-sm">{bm.note}</span>
                                                                <span className="opacity-50 text-[10px] font-medium">{bm.date}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                </div>
                                <div className="p-4 border-t" style={{ borderColor: 'var(--border-color)' }}>
                                    <button onClick={() => { setSettingsOpen(true); setSidebarOpen(false); }} className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl hover:bg-black/5 dark:hover:bg-white/5 transition font-bold opacity-70 hover:opacity-100">
                                        <Icons.Settings /> {t.settings}
                                    </button>
                                </div>
                            </div>
                            <div className="flex-1 bg-black/40 backdrop-blur-sm transition-opacity" onClick={() => setSidebarOpen(false)}></div>
                        </div>
                    )}

                    {/* MAIN CONTENT - LIBRARY */}
                    {view === 'library' && (
                        <div className="library-container w-full relative">

                            {displayedBooks.length === 0 && (
                                <div className="absolute inset-0 flex items-center justify-center p-6 fade-in h-full">
                                    <div className="empty-state-container max-w-2xl w-full p-12 rounded-[2rem] flex flex-col items-center text-center shadow-sm">
                                        <div className="w-24 h-24 mb-6 rounded-full flex items-center justify-center shadow-inner" style={{ backgroundColor: 'var(--topbar-bg)', color: 'white' }}>
                                            {currentFilter === 'favorites' ? <Icons.Heart className="w-12 h-12" /> : <Icons.BookOpen />}
                                        </div>
                                        <h2 className="text-3xl font-black mb-3">
                                            {currentFilter === 'favorites' ? 'Sin Favoritos' : t.emptyTitle}
                                        </h2>
                                        <p className="text-lg opacity-70 mb-10 max-w-lg">
                                            {currentFilter === 'favorites' ? 'Aún no has marcado ningún libro como favorito. Haz clic derecho en un libro para añadirlo.' : t.emptyDesc}
                                        </p>

                                        {currentFilter === 'all' && (
                                            <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
                                                <button onClick={() => fileInputRef.current.click()} className="px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition transform hover:-translate-y-1 flex items-center justify-center gap-2">
                                                    <Icons.Plus /> {t.addBook}
                                                </button>
                                                <button onClick={() => folderInputRef.current.click()} className="px-8 py-4 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition transform hover:-translate-y-1 flex items-center justify-center gap-2">
                                                    <Icons.FolderPlus /> {t.addFolder}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {displayedBooks.length > 0 && (
                                <div className="books-grid fade-in">
                                    {displayedBooks.map((book) => (
                                        <div
                                            key={book.id}
                                            className="book-container"
                                            onClick={() => openBook(book.id)}
                                            onContextMenu={(e) => handleContextMenu(e, book)}
                                        >
                                            {book.isFav && <div className="favorite-badge"><Icons.Heart fill="white" className="w-3 h-3" /></div>}

                                            <div
                                                className={`book-cover ${book.coverUrl ? 'has-image' : ''}`}
                                                style={{
                                                    backgroundImage: book.coverUrl ? `url(${book.coverUrl})` : 'none',
                                                    backgroundColor: book.coverUrl ? 'transparent' : book.color
                                                }}
                                            >
                                                {!book.coverUrl && <span className="px-3 leading-snug">{book.name}</span>}

                                                {/* PROGRESO 100% FUNCIONAL Y VISIBLE */}
                                                {(book.progress > 0 || book.lastReadDate > 0) && (
                                                    <div className="cover-progress-wrapper">
                                                        <div className="cover-progress-fill" style={{ width: `${book.progress || 0}%` }}></div>
                                                        <div className="cover-progress-text">{book.progress || 0}%</div>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="book-info-under">
                                                <div className="title" title={book.name}>{book.name}</div>
                                                <div className="author" title={book.author}>{book.author}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="md:hidden fixed bottom-6 right-6 flex flex-col gap-4 z-30">
                                <button onClick={() => folderInputRef.current.click()} className="w-12 h-12 rounded-full flex items-center justify-center text-white shadow-xl bg-slate-700 hover:scale-110 transition-transform">
                                    <Icons.FolderPlus />
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="w-14 h-14 rounded-full flex items-center justify-center text-white shadow-xl hover:scale-110 transition-transform" style={{ backgroundColor: 'var(--highlight)' }}>
                                    <Icons.Plus />
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MENÚ CONTEXTUAL */}
                    {contextMenu && (
                        <div
                            className="absolute shadow-2xl rounded-2xl py-2 z-50 text-sm border backdrop-blur-xl fade-in"
                            style={{
                                top: contextMenu.y, left: contextMenu.x,
                                backgroundColor: 'var(--surface-bg)', color: 'var(--text-color)',
                                borderColor: 'var(--border-color)',
                                minWidth: '200px'
                            }}
                        >
                            <button onClick={() => setBookInfoModal(contextMenu.book)} className="w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-black/5 dark:hover:bg-white/5 font-semibold transition">
                                <Icons.Info /> {t.bookInfo}
                            </button>
                            <button onClick={() => { toggleFavorite(contextMenu.book.id); setContextMenu(null); }} className="w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-black/5 dark:hover:bg-white/5 font-semibold transition">
                                <Icons.Heart fill={contextMenu.book.isFav ? '#ef4444' : 'none'} className={contextMenu.book.isFav ? 'text-red-500' : ''} />
                                {contextMenu.book.isFav ? t.remFav : t.addFav}
                            </button>
                            <div className="border-t my-1" style={{ borderColor: 'var(--border-color)' }}></div>
                            <button onClick={() => { deleteBook(contextMenu.book.id); setContextMenu(null); }} className="w-full text-left px-5 py-3 flex items-center gap-3 text-red-500 hover:bg-red-500/10 font-bold transition">
                                <Icons.Trash /> {t.deleteBook}
                            </button>
                        </div>
                    )}

                    {/* MODAL INFO LIBRO */}
                    {bookInfoModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm fade-in" onClick={() => setBookInfoModal(null)}>
                            <div className="rounded-3xl shadow-2xl p-8 w-80 max-w-[90%] relative transform scale-100 transition-transform" style={{ backgroundColor: 'var(--surface-bg)', border: '1px solid var(--border-color)' }} onClick={e => e.stopPropagation()}>
                                <button onClick={() => setBookInfoModal(null)} className="absolute top-4 right-4 p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition"><Icons.Close /></button>
                                <div className="flex flex-col items-center text-center mt-2">
                                    {bookInfoModal.coverUrl ? (
                                        <img src={bookInfoModal.coverUrl} alt="Cover" className="w-40 h-60 object-cover rounded-lg shadow-xl mb-5" />
                                    ) : (
                                        <div className="w-40 h-60 rounded-lg shadow-xl mb-5 flex items-center justify-center text-white p-4 text-sm font-bold" style={{ backgroundColor: bookInfoModal.color }}>Sin Portada</div>
                                    )}
                                    <h3 className="font-black text-xl mb-1 leading-tight">{bookInfoModal.name}</h3>
                                    <p className="text-sm opacity-60 mb-5 font-semibold">{bookInfoModal.author}</p>
                                    <div className="flex gap-2 w-full justify-center">
                                        <span className="text-xs px-3 py-1.5 bg-slate-500/10 text-slate-600 dark:text-slate-300 rounded-lg uppercase font-bold tracking-wider">{bookInfoModal.type}</span>
                                        <span className="text-xs px-3 py-1.5 bg-blue-500/10 text-blue-600 dark:text-blue-400 rounded-lg font-bold tracking-wider">{bookInfoModal.progress || 0}% Leído</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LECTOR DE LIBROS: Reemplaza vista central */}
                    {view === 'reader' && currentBookData && (
                        <div className="flex-1 flex flex-col overflow-hidden relative fade-in w-full h-full" style={{ backgroundColor: 'var(--bg-color)' }}>
                            {currentBookData.type === 'epub' ? (
                                <EpubReader
                                    bookData={currentBookData}
                                    targetCfi={targetCfi}
                                    theme={theme}
                                    t={t}
                                    brightness={brightness}
                                    setBrightness={setBrightness}
                                    readFlow={readFlow}
                                    readLayout={readLayout}
                                    updateLocationAndProgress={updateBookLocation}
                                    toggleBookmark={toggleBookmarkInApp}
                                    isFullscreen={isFullscreen}
                                    onClose={closeBook}
                                    onOpenSettings={() => setSettingsOpen(true)}
                                />
                            ) : (
                                <div className="w-full h-full flex flex-col">
                                    {/* Barra superior básica para PDFs que sí ocupa el espacio */}
                                    <div className={`flex-shrink-0 flex items-center justify-between px-6 text-white shadow-lg z-40 transition-all duration-300 ${isFullscreen ? 'hidden' : 'h-16'}`} style={{ backgroundColor: 'var(--topbar-bg)' }}>
                                        <button onClick={closeBook} className="p-2 hover:bg-black/20 rounded-full transition transform hover:-translate-x-1"><Icons.Back /></button>
                                        <span className="font-bold text-lg tracking-wider shadow-sm truncate flex-1 ml-4">{currentBookData.name}</span>
                                    </div>
                                    <iframe src={`${currentBookData.url}#toolbar=0`} className="w-full h-full border-none flex-1" title="PDF Reader" />
                                </div>
                            )}
                        </div>
                    )}

                    {/* MODAL CONFIGURACIÓN GLOBAL */}
                    {settingsOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm fade-in" onClick={() => setSettingsOpen(false)}>
                            <div className="rounded-3xl shadow-2xl p-8 w-[500px] max-w-[95%] relative max-h-[90vh] overflow-y-auto" style={{ backgroundColor: 'var(--surface-bg)', border: '1px solid var(--border-color)' }} onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6 border-b pb-4" style={{ borderColor: 'var(--border-color)' }}>
                                    <h2 className="text-2xl font-black">{t.settings}</h2>
                                    <button onClick={() => setSettingsOpen(false)} className="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full transition"><Icons.Close /></button>
                                </div>

                                <div className="mb-8">
                                    <label className="block text-xs font-black mb-3 opacity-50 uppercase tracking-widest pl-1">{t.theme}</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <label className={`flex items-center gap-3 cursor-pointer p-4 border rounded-2xl transition font-semibold ${theme === 'light' ? 'border-blue-500 bg-blue-500/10 text-blue-600 dark:text-blue-400' : 'border-transparent bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10'}`}>
                                            <input type="radio" name="theme" checked={theme === 'light'} onChange={() => setTheme('light')} className="hidden" />
                                            <Icons.Sun /> <span className="text-sm">{t.light}</span>
                                        </label>
                                        <label className={`flex items-center gap-3 cursor-pointer p-4 border rounded-2xl transition font-semibold ${theme === 'dark' ? 'border-blue-500 bg-blue-500/10 text-blue-600 dark:text-blue-400' : 'border-transparent bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10'}`}>
                                            <input type="radio" name="theme" checked={theme === 'dark'} onChange={() => setTheme('dark')} className="hidden" />
                                            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                                            <span className="text-sm">{t.dark}</span>
                                        </label>
                                        <label className={`flex items-center gap-3 cursor-pointer p-4 border rounded-2xl transition font-semibold col-span-2 ${theme === 'sepia' ? 'border-orange-500 bg-orange-500/10 text-orange-600 dark:text-orange-400' : 'border-transparent bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10'}`}>
                                            <input type="radio" name="theme" checked={theme === 'sepia'} onChange={() => setTheme('sepia')} className="hidden" />
                                            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                            <span className="text-sm">{t.sepia}</span>
                                        </label>
                                    </div>
                                </div>

                                <div className="mb-8">
                                    <label className="block text-xs font-black mb-3 opacity-50 uppercase tracking-widest pl-1">Configuración de Lector</label>
                                    <div className="bg-black/5 dark:bg-white/5 p-5 rounded-2xl border border-transparent">
                                        <div className="mb-5">
                                            <label className="block text-sm font-bold mb-2 opacity-80">{t.flow}</label>
                                            <div className="flex bg-black/10 dark:bg-black/40 rounded-xl p-1">
                                                <button onClick={() => setReadFlow('paginated')} className={`flex-1 flex items-center justify-center gap-2 py-2 text-sm font-bold rounded-lg transition shadow-sm ${readFlow === 'paginated' ? 'bg-white text-blue-600 dark:bg-slate-700 dark:text-blue-400' : 'opacity-60 hover:opacity-100'}`}>
                                                    <Icons.FlowHorizontal /> {t.horizontal}
                                                </button>
                                                <button onClick={() => setReadFlow('scrolled-doc')} className={`flex-1 flex items-center justify-center gap-2 py-2 text-sm font-bold rounded-lg transition shadow-sm ${readFlow === 'scrolled-doc' ? 'bg-white text-blue-600 dark:bg-slate-700 dark:text-blue-400' : 'opacity-60 hover:opacity-100'}`}>
                                                    <Icons.FlowVertical /> {t.vertical}
                                                </button>
                                            </div>
                                        </div>
                                        <div className={readFlow !== 'paginated' ? 'opacity-50 pointer-events-none' : ''}>
                                            <label className="block text-sm font-bold mb-2 opacity-80">{t.layout}</label>
                                            <div className="flex bg-black/10 dark:bg-black/40 rounded-xl p-1">
                                                <button onClick={() => setReadLayout('none')} className={`flex-1 flex items-center justify-center gap-2 py-2 text-sm font-bold rounded-lg transition shadow-sm ${readLayout === 'none' ? 'bg-white text-blue-600 dark:bg-slate-700 dark:text-blue-400' : 'opacity-60 hover:opacity-100'}`}>
                                                    <Icons.SinglePage /> {t.single}
                                                </button>
                                                <button onClick={() => setReadLayout('auto')} className={`flex-1 flex items-center justify-center gap-2 py-2 text-sm font-bold rounded-lg transition shadow-sm ${readLayout === 'auto' ? 'bg-white text-blue-600 dark:bg-slate-700 dark:text-blue-400' : 'opacity-60 hover:opacity-100'}`}>
                                                    <Icons.DoublePage /> {t.double}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-black mb-3 opacity-50 uppercase tracking-widest pl-1">{t.language}</label>
                                    <select value={lang} onChange={(e) => setLang(e.target.value)} className="w-full p-4 rounded-2xl border bg-black/5 dark:bg-white/5 outline-none font-semibold transition hover:bg-black/10 dark:hover:bg-white/10" style={{ borderColor: 'transparent' }}>
                                        <option value="es" style={{ color: 'black' }}>Español</option>
                                        <option value="en" style={{ color: 'black' }}>English</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENTE VISOR DE EPUB ---
        const EpubReader = ({ bookData, targetCfi, theme, t, brightness, setBrightness, readFlow, readLayout, updateLocationAndProgress, toggleBookmark, isFullscreen, onClose, onOpenSettings }) => {
            const viewerRef = useRef(null);
            const renditionRef = useRef(null);
            const bookRef = useRef(null);
            const locationsReadyRef = useRef(false);

            const [fontSize, setFontSize] = useState(110);
            const [currentCfi, setCurrentCfi] = useState('');
            const [isLoading, setIsLoading] = useState(true);

            const [toc, setToc] = useState([]);
            const [showToc, setShowToc] = useState(false);
            const [isDrawing, setIsDrawing] = useState(false);

            const canvasRef = useRef(null);
            const ctxRef = useRef(null);
            const isPainting = useRef(false);

            // Función ultra-robusta para calcular el porcentaje pase lo que pase
            const getPercentage = (book, cfi) => {
                if (!book || !cfi) return 0;
                // 1. Intento exacto (si epub.js terminó de generar locaciones)
                if (locationsReadyRef.current && book.locations && book.locations.length > 0) {
                    const pct = book.locations.percentageFromCfi(cfi);
                    if (pct !== null && pct >= 0) return Math.round(pct * 100);
                }
                // 2. Fallback instantáneo (basado en el capítulo actual)
                if (book.spine) {
                    try {
                        const spineItem = book.spine.get(cfi);
                        if (spineItem) {
                            return Math.round((spineItem.index / book.spine.length) * 100);
                        }
                    } catch (e) {
                        console.error("Spine fallback error:", e);
                    }
                }
                return 0;
            };

            useEffect(() => {
                if (!viewerRef.current) return;

                const book = ePub(bookData.file);
                bookRef.current = book;

                const rendition = book.renderTo(viewerRef.current, {
                    width: "100%",
                    height: "100%",
                    spread: readLayout,
                    manager: "continuous",
                    flow: readFlow
                });
                renditionRef.current = rendition;

                const paddingPx = readLayout === 'auto' ? "0 40px" : "0 20px";
                rendition.themes.register("light", { "body": { "background": "#f8fafc", "color": "#0f172a", "padding": `${paddingPx} !important` } });
                rendition.themes.register("dark", { "body": { "background": "#0f172a", "color": "#f1f5f9", "padding": `${paddingPx} !important` } });
                rendition.themes.register("sepia", { "body": { "background": "#fef3c7", "color": "#451a03", "padding": `${paddingPx} !important` } });

                rendition.themes.select(theme);
                rendition.themes.fontSize(`${fontSize}%`);

                rendition.on('click', () => setShowToc(false));

                // NAVEGACION
                rendition.on('keyup', (event) => {
                    const e = event || window.event;
                    if (e.keyCode === 37) prevPage();
                    if (e.keyCode === 39) nextPage();
                });

                book.loaded.navigation.then((nav) => {
                    if (nav && nav.toc) setToc(nav.toc);
                });

                // PROGRESO 100% SEGURO
                book.ready.then(() => {
                    setIsLoading(false);
                    return book.locations.generate(1600); // Tarda unos segundos
                }).then(() => {
                    locationsReadyRef.current = true;
                    // Una vez listos los cálculos exactos, actualizar estado actual
                    if (renditionRef.current) {
                        const loc = renditionRef.current.currentLocation();
                        if (loc && loc.start) {
                            const percent = getPercentage(bookRef.current, loc.start.cfi);
                            updateLocationAndProgress(bookData.id, loc.start.cfi, percent);
                        }
                    }
                }).catch(err => {
                    console.error("Error generating locations", err);
                    setIsLoading(false);
                });

                const initialLocation = targetCfi || bookData.lastLocation || undefined;
                rendition.display(initialLocation);

                rendition.on('relocated', (location) => {
                    const cfi = location.start.cfi;
                    setCurrentCfi(cfi);
                    const percent = getPercentage(bookRef.current, cfi);
                    updateLocationAndProgress(bookData.id, cfi, percent);
                });

                return () => book.destroy();
            }, [bookData.file, readFlow, readLayout]);

            useEffect(() => { if (renditionRef.current) renditionRef.current.themes.select(theme); }, [theme]);
            useEffect(() => { if (renditionRef.current) renditionRef.current.themes.fontSize(`${fontSize}%`); }, [fontSize]);

            // EVENTOS DE SCROLL / TECLADO
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (readFlow !== 'paginated') return;
                    if (e.key === 'ArrowLeft') prevPage();
                    if (e.key === 'ArrowRight') nextPage();
                };

                let wheelTimeout;
                const handleWheel = (e) => {
                    if (readFlow !== 'paginated') return;
                    if (wheelTimeout) return;

                    wheelTimeout = setTimeout(() => { wheelTimeout = null; }, 400);

                    if (e.deltaY > 0) nextPage();
                    else if (e.deltaY < 0) prevPage();
                };

                document.addEventListener('keyup', handleKeyDown);
                if (readFlow === 'paginated') {
                    document.addEventListener('wheel', handleWheel);
                }

                return () => {
                    document.removeEventListener('keyup', handleKeyDown);
                    document.removeEventListener('wheel', handleWheel);
                    if (wheelTimeout) clearTimeout(wheelTimeout);
                };
            }, [readFlow]);

            // DIBUJO
            useEffect(() => {
                if (isDrawing && canvasRef.current) {
                    const canvas = canvasRef.current;
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 4;
                    ctxRef.current = ctx;
                }
            }, [isDrawing]);

            const startDraw = ({ nativeEvent }) => {
                if (!isDrawing) return;
                const { offsetX, offsetY } = nativeEvent;
                ctxRef.current.beginPath();
                ctxRef.current.moveTo(offsetX, offsetY);
                isPainting.current = true;
            };
            const draw = ({ nativeEvent }) => {
                if (!isPainting.current || !isDrawing) return;
                const { offsetX, offsetY } = nativeEvent;
                ctxRef.current.lineTo(offsetX, offsetY);
                ctxRef.current.stroke();
            };
            const endDraw = () => { isPainting.current = false; };
            const clearCanvas = () => {
                if (canvasRef.current && ctxRef.current) {
                    ctxRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                }
            };

            const prevPage = () => {
                if (renditionRef.current && readFlow === 'paginated') {
                    renditionRef.current.prev();
                    clearCanvas();
                }
            };
            const nextPage = () => {
                if (renditionRef.current && readFlow === 'paginated') {
                    renditionRef.current.next();
                    clearCanvas();
                }
            };

            const jumpToToc = (href) => {
                if (renditionRef.current) {
                    renditionRef.current.display(href);
                    setShowToc(false);
                }
            };

            const handleAddBookmark = () => {
                if (renditionRef.current) {
                    const loc = renditionRef.current.currentLocation();
                    if (loc && loc.start) {
                        const percent = getPercentage(bookRef.current, loc.start.cfi);
                        const noteStr = `Página ~${percent}%`;
                        toggleBookmark(bookData.id, loc.start.cfi, noteStr);
                    }
                }
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => { });
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            };

            const isBookmarked = currentCfi && bookData.bookmarks.some(b => b.cfi === currentCfi);
            const maxWidthStr = readFlow === 'paginated' && readLayout === 'auto' ? '1800px' : '1000px';

            return (
                <div className={`w-full h-full flex flex-col relative bg-transparent ${isFullscreen ? 'fixed inset-0 z-50' : ''}`} style={isFullscreen ? { backgroundColor: 'var(--bg-color)' } : {}}>

                    {isLoading && (
                        <div className="absolute inset-0 flex items-center justify-center z-50 bg-black/10 backdrop-blur-sm">
                            <div className="loader"></div>
                        </div>
                    )}

                    {/* BARRA SUPERIOR SÓLIDA DEL LECTOR (Empuja el texto hacia abajo) */}
                    <div className={`flex-shrink-0 flex items-center justify-between px-6 text-white shadow-lg z-40 transition-all duration-300 ${isFullscreen ? 'hidden' : 'h-16'}`} style={{ backgroundColor: 'var(--topbar-bg)' }}>
                        <div className="flex items-center gap-5">
                            <button onClick={onClose} className="p-2 hover:bg-black/20 rounded-full transition transform hover:-translate-x-1"><Icons.Back /></button>
                            <span className="font-bold text-lg tracking-wider shadow-sm truncate max-w-[200px] sm:max-w-xs">{bookData.name}</span>
                        </div>

                        <div className="flex items-center gap-2 sm:gap-4">

                            {/* Índice (ToC) */}
                            <div className="relative">
                                <button onClick={() => setShowToc(!showToc)} className={`p-2 rounded-xl transition ${showToc ? 'bg-black/30' : 'hover:bg-white/15'}`} title={t.toc}>
                                    <Icons.List />
                                </button>
                                {/* Dropdown ToC */}
                                {showToc && (
                                    <div className="absolute top-12 right-0 md:left-0 w-80 max-h-[70vh] overflow-y-auto bg-slate-900 text-white border border-slate-700 rounded-2xl shadow-2xl p-2 z-50">
                                        <h4 className="font-black text-[10px] uppercase opacity-50 px-3 py-2 border-b border-slate-700 mb-2 tracking-widest">{t.toc}</h4>
                                        {toc.length === 0 ? <p className="text-sm p-3 opacity-70">No hay índice disponible.</p> : null}
                                        {toc.map((item, i) => (
                                            <button key={i} onClick={() => jumpToToc(item.href)} className="w-full text-left text-sm p-2.5 hover:bg-blue-500/20 font-medium rounded-xl transition truncate">
                                                {item.label}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="w-px h-6 bg-white/20 hidden md:block"></div>

                            {/* Controles embebidos elegantes */}
                            <div className="hidden md:flex items-center gap-2 bg-black/20 px-4 py-1.5 rounded-full">
                                <Icons.Sun className="w-4 h-4 opacity-70" />
                                <input type="range" min="10" max="100" value={brightness} onChange={e => setBrightness(e.target.value)} className="w-20 accent-blue-400" title={t.brightness} />
                            </div>

                            <div className="hidden md:flex items-center gap-1 bg-black/20 px-2 py-1 rounded-full">
                                <button onClick={() => setFontSize(Math.max(50, fontSize - 10))} className="p-1.5 hover:bg-white/20 rounded-full transition" title={t.zoomOut}><Icons.ZoomOut className="w-4 h-4" /></button>
                                <span className="text-xs w-10 text-center font-bold">{fontSize}%</span>
                                <button onClick={() => setFontSize(Math.min(250, fontSize + 10))} className="p-1.5 hover:bg-white/20 rounded-full transition" title={t.zoomIn}><Icons.ZoomIn className="w-4 h-4" /></button>
                            </div>

                            <div className="w-px h-6 bg-white/20 hidden sm:block"></div>

                            {/* Herramientas Principales */}
                            <button onClick={handleAddBookmark} className="p-2 hover:bg-white/15 rounded-xl transition" title={t.bookmarks}>
                                <Icons.Bookmark fill={isBookmarked ? "#facc15" : "none"} color={isBookmarked ? "#facc15" : "currentColor"} />
                            </button>

                            <button onClick={() => setIsDrawing(!isDrawing)} className={`p-2 rounded-xl transition ${isDrawing ? 'bg-red-500 text-white' : 'hover:bg-white/15'}`} title={t.draw}>
                                <Icons.Pen />
                            </button>
                            {isDrawing && (
                                <button onClick={clearCanvas} className="p-2 bg-red-500/20 text-red-100 hover:bg-red-500/40 rounded-xl transition" title={t.erase}>
                                    <Icons.Eraser />
                                </button>
                            )}

                            <button onClick={onOpenSettings} className="p-2 hover:bg-white/15 rounded-xl transition" title={t.settings}>
                                <Icons.Settings />
                            </button>

                            <button onClick={toggleFullscreen} className="p-2 hover:bg-white/15 rounded-xl transition" title={t.fullscreen}>
                                <Icons.Fullscreen />
                            </button>
                        </div>
                    </div>

                    {/* ZONAS INVISIBLES DE NAVEGACIÓN (laterales) */}
                    {readFlow === 'paginated' && (
                        <>
                            <div onClick={prevPage} className="reader-nav-zone" style={{ left: 0 }}>
                                <div className="reader-nav-btn"><Icons.ChevronLeft /></div>
                            </div>
                            <div onClick={nextPage} className="reader-nav-zone" style={{ right: 0 }}>
                                <div className="reader-nav-btn"><Icons.ChevronRight /></div>
                            </div>
                        </>
                    )}

                    {/* MARCO PRINCIPAL LECTOR (El texto fluye aquí debajo libremente) */}
                    <div className="flex-1 relative flex items-center justify-center overflow-hidden w-full pt-4 pb-4">
                        <div
                            id="viewer"
                            ref={viewerRef}
                            className="w-full h-full px-8 sm:px-16"
                            style={{
                                maxWidth: maxWidthStr,
                                margin: '0 auto',
                                overflowY: readFlow === 'scrolled-doc' ? 'auto' : 'hidden'
                            }}
                        ></div>

                        {/* Capa de Dibujo */}
                        {isDrawing && (
                            <canvas
                                ref={canvasRef}
                                id="drawing-layer"
                                onMouseDown={startDraw}
                                onMouseMove={draw}
                                onMouseUp={endDraw}
                                onMouseLeave={endDraw}
                                className="cursor-crosshair absolute top-0 left-0 w-full h-full z-30"
                            />
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
