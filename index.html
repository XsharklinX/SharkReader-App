<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Reader PC</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@500;700;800&family=Roboto+Slab:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/main.css">
</head>
<body class="theme-dark">

    <div id="shark-preloader" aria-live="polite">
        <div class="preloader-app">
            <div class="preloader-topbar">
                <div class="preloader-brand">
                    <span class="preloader-brand-mark">SR</span>
                    <div class="preloader-brand-copy">
                        <span class="preloader-brand-title">Shark Reader</span>
                        <span class="preloader-brand-subtitle">Desktop Library</span>
                    </div>
                </div>
                <div class="preloader-search"></div>
                <div class="preloader-topbar-actions">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="preloader-main">
                <aside class="preloader-sidebar">
                    <div class="preloader-nav-item active"></div>
                    <div class="preloader-nav-item"></div>
                    <div class="preloader-nav-item short"></div>
                    <div class="preloader-nav-spacer"></div>
                    <div class="preloader-nav-item tiny"></div>
                    <div class="preloader-nav-item tiny"></div>
                </aside>

                <section class="preloader-library">
                    <div class="preloader-status">
                        <span class="loading-dot"></span>
                        <span>Cargando biblioteca</span>
                    </div>

                    <div class="loading-bar">
                        <div class="loading-progress"></div>
                    </div>

                    <div class="preloader-grid">
                        <div class="preloader-book-card"><span></span><span></span></div>
                        <div class="preloader-book-card"><span></span><span></span></div>
                        <div class="preloader-book-card"><span></span><span></span></div>
                        <div class="preloader-book-card"><span></span><span></span></div>
                        <div class="preloader-book-card"><span></span><span></span></div>
                        <div class="preloader-book-card"><span></span><span></span></div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="root"></div>

    <script>
        window.__hideSharkPreloader = function () {
            const loader = document.getElementById('shark-preloader');
            if (!loader || loader.dataset.hidden === 'true') return;
            loader.dataset.hidden = 'true';
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.visibility = 'hidden';
                loader.style.pointerEvents = 'none';
            }, 420);
        };
        window.addEventListener('error', () => window.__hideSharkPreloader());
        setTimeout(() => window.__hideSharkPreloader(), 2200);
    </script>

    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
